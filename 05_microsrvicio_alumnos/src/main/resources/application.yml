spring:
  application:
    name: 05_microsrvicio_alumnos
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      naming:
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
  profiles:
    active: 'dev'
server:
  port: 8001
  servlet:
    context-path: /escuela
---
spring:
  datasource:
    url: jdbc:mysql://${HOST_DB}:${PORT_DB}/alumnoscursos
    username: ${USER_DB}
    password: ${PASS_DB}
  config:
    activate:
      on-profile: prod
---
spring:
  datasource:
    url: jdbc:mysql://localhost:3307/alumnoscursos
    username: root
    password: root
  config:
    activate:
      on-profile: dev

