spring.application.name=servicio-alumnos
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${HOST_DB}:${PORT_DB}/alumnoscursos
spring.datasource.username=${USER_DB}
spring.datasource.password=${PASS_DB}
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
server.port=8001
server.servlet.context-path=/escuela
security.db.url=jdbc:mysql://${HOST_DB}:${PORT_DB}/springsecurity
eureka.client.service-url.defaultZone=http://${HOST_EUREKA}:8761/eureka
eureka.instance.hostname=${HOST_ALUMNOS}
eureka.instance.non-secure-port=${PORT_ALUMNOS}
